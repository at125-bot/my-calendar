<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>カレンダー</title>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none; 
        }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #fdfdfd; }
        
        /* ヘッダーエリア */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title { font-size: 1.2rem; font-weight: bold; text-align: center; }
        button { padding: 6px 12px; font-size: 0.9rem; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; }
        .today-btn { background: #228be6; color: white; border: none; }

        /* カレンダー本体 */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e5e5e5; border: 1px solid #e5e5e5; }
        .grid div { background: #fff; text-align: center; padding: 8px 2px; min-height: 60px; font-size: 0.9rem; position: relative; }
        .weekdays div { background: #f8f9fa; font-weight: bold; min-height: auto; padding: 4px; color: #495057; }
        
        /* 曜日ごとの文字色ルール */
        .grid div.sun-color { color: #fa5252; } 
        .grid div.sat-color { color: #228be6; } 

        /* タップした日の「青枠」ルール */
        .grid div.selected { outline: 2px solid #228be6; z-index: 10; }

        /* 背景色 5種類 */
        .default { background-color: #ffffff !important; }
        .blue    { background-color: #c6ffff !important; } 
        .orange  { background-color: #ffe0c1 !important; } 
        .yellow  { background-color: #ffffbc !important; } 
        .pink    { background-color: #fff0f6 !important; } 
        .gray    { background-color: #f5f5f5 !important; } 

        /* アイコンとテキスト */
        .icon-space { display: block; font-size: 0.9rem; margin-top: 2px; }

        /* カレンダーの下の凡例エリア */
        .legend-area {
            margin-top: 15px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: #868e96;
            margin-bottom: 2px;
        }
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #495057;
        }
        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #dee2e6;
            flex-shrink: 0;
        }
        /* カウント数字用のスタイル */
        .count-num {
            font-weight: bold;
            color: #228be6;
            margin-left: 4px;
        }
        
        /* ポップアップ（長押し設定画面） */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:100; }
        .modal-content { background:#fff; padding:20px; border-radius:8px; width:90%; max-width:320px; text-align:center; }
        .modal-section { margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; }
        
        /* 設定画面内の選択中（active）のデザイン */
        .color-btn { width: 34px; height: 34px; border-radius: 50%; display: inline-block; margin: 4px; border: 1px solid #ccc; cursor: pointer; vertical-align: middle; }
        .color-btn.active { outline: 3px solid #333; outline-offset: 1px; }
        
        .emoji-btn { padding: 8px 10px; margin: 3px; font-size: 0.95rem; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        .emoji-btn.active { background: #e7f5ff; border: 2px solid #228be6; font-weight: bold; }
    </style>
</head>
<body id="swipeArea">

    <div class="header">
        <button id="prevBtn">前月</button>
        <div>
            <div id="monthYear" class="title"></div>
            <button id="todayBtn" class="today-btn">今日</button>
        </div>
        <button id="nextBtn">次月</button>
    </div>

    <div class="grid weekdays">
        <div style="color: #fa5252;">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color: #228be6;">土</div>
    </div>
    <div class="grid" id="daysContainer"></div>

    <div class="legend-area">
        <div class="legend-title">【背景色】</div>
        <div class="legend-grid">
            <div class="legend-item"><div class="legend-dot blue"></div><span>① 🛀<span id="count-blue" class="count-num"></span></span></div>
            <div class="legend-item"><div class="legend-dot orange"></div><span>② 🚿all<span id="count-orange" class="count-num"></span></span></div>
            <div class="legend-item"><div class="legend-dot yellow"></div><span>③ 🚿half<span id="count-yellow" class="count-num"></span></span></div>
            <div class="legend-item"><div class="legend-dot pink"></div><span>④ sheet<span id="count-pink" class="count-num"></span></span></div>
            <div class="legend-item"><div class="legend-dot gray"></div><span>⑤ none<span id="count-gray" class="count-num"></span></span></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-section">背景色</div>
            <div class="color-btn default" data-color="default"></div>
            <div class="color-btn blue" data-color="blue"></div>
            <div class="color-btn orange" data-color="orange"></div>
            <div class="color-btn yellow" data-color="yellow"></div>
            <div class="color-btn pink" data-color="pink"></div>
            <div class="color-btn gray" data-color="gray"></div>

            <div class="modal-section" style="margin-top:15px;">アイコン</div>
            <button class="emoji-btn" data-emoji="none">なし</button>
            <button class="emoji-btn" data-emoji="🌸">🌸</button>
            <button class="emoji-btn" data-emoji="🌙">🌙</button>
            <button class="emoji-btn" data-emoji="🌸🌙">🌸🌙</button>

            <div style="margin-top:20px; display:flex; gap:10px;">
                <button id="cancelBtn" style="flex:1;">キャンセル</button>
                <button id="saveBtn" style="flex:1; background:#228be6; color:white; border:none;">保存</button>
            </div>
        </div>
    </div>

<script>
    let currentDate = new Date();
    let selectedDateStr = ""; 
    let targetDateStr = "";
    let tmpColor = "default";
    let tmpEmoji = "none";
    let calendarData = JSON.parse(localStorage.getItem('simple_cal_data')) || {};

    const monthYearEl = document.getElementById('monthYear');
    const daysContainer = document.getElementById('daysContainer');
    const modal = document.getElementById('modal');

    function renderCalendar(date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        monthYearEl.textContent = `${year}年 ${month + 1}月`;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();

        daysContainer.innerHTML = '';

        // 今月の各色のカウント用変数をリセット
        let counts = { blue: 0, orange: 0, yellow: 0, pink: 0, gray: 0 };

        // 空白埋め
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.style.background = "#fcfcfc";
            daysContainer.appendChild(empty);
        }

        // 日付マス生成
        for (let day = 1; day <= lastDay; day++) {
            const dayDiv = document.createElement('div');
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            dayDiv.dataset.date = dateStr;

            // 土日の文字色クラスを判定して付与
            const currentWeekDay = new Date(year, month, day).getDay();
            if (currentWeekDay === 0) dayDiv.classList.add('sun-color');
            if (currentWeekDay === 6) dayDiv.classList.add('sat-color');

            // 日付の数字
            const numSpan = document.createElement('span');
            numSpan.textContent = day;
            dayDiv.appendChild(numSpan);

            // アイコン表示スペース
            const iconSpan = document.createElement('span');
            iconSpan.classList.add('icon-space');
            dayDiv.appendChild(iconSpan);

            // 保存データの適用とカウント
            if (calendarData[dateStr]) {
                const savedColor = calendarData[dateStr].color;
                if (savedColor && savedColor !== 'default') {
                    dayDiv.classList.add(savedColor);
                    // 表示されている月の日付の場合のみカウントに加算
                    if (counts[savedColor] !== undefined) {
                        counts[savedColor]++;
                    }
                }
                if (calendarData[dateStr].emoji && calendarData[dateStr].emoji !== 'none') {
                    iconSpan.textContent = calendarData[dateStr].emoji;
                }
            }

            // タップした日の青枠を適用
            if (dateStr === selectedDateStr) dayDiv.classList.add('selected');

            // タップイベント
            dayDiv.addEventListener('click', () => {
                document.querySelectorAll('#daysContainer .selected').forEach(el => el.classList.remove('selected'));
                dayDiv.classList.add('selected');
                selectedDateStr = dateStr;
            });

            // 長押しイベント（0.6秒）
            let timer;
            dayDiv.addEventListener('touchstart', () => {
                timer = setTimeout(() => {
                    targetDateStr = dateStr;
                    tmpColor = calendarData[dateStr]?.color || "default";
                    tmpEmoji = calendarData[dateStr]?.emoji || "none";
                    
                    updateModalSelection();
                    modal.style.display = 'flex';
                }, 600);
            }, {passive:true});
            dayDiv.addEventListener('touchend', () => clearTimeout(timer));
            dayDiv.addEventListener('touchmove', () => clearTimeout(timer));

            daysContainer.appendChild(dayDiv);
        }

        // 【追加】凡例の横にカウント数を反映させる処理
        Object.keys(counts).forEach(color => {
            const countEl = document.getElementById(`count-${color}`);
            if (countEl) {
                // 1回以上使われていれば「（○日）」と表示、0回なら空っぽにする
                countEl.textContent = counts[color] > 0 ? ` （${counts[color]}日）` : '';
            }
        });
    }

    // 設定画面の選択中スタイルを更新する関数
    function updateModalSelection() {
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.color === tmpColor);
        });
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.emoji === tmpEmoji);
        });
    }

    // 設定画面内のボタンタップ処理
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            tmpColor = btn.dataset.color;
            updateModalSelection();
        });
    });
    document.querySelectorAll('.emoji-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            tmpEmoji = btn.dataset.emoji;
            updateModalSelection();
        });
    });

    // 保存・キャンセル処理
    document.getElementById('saveBtn').addEventListener('click', () => {
        if (!calendarData[targetDateStr]) calendarData[targetDateStr] = {};
        calendarData[targetDateStr].color = tmpColor;
        calendarData[targetDateStr].emoji = tmpEmoji;
        localStorage.setItem('simple_cal_data', JSON.stringify(calendarData));
        modal.style.display = 'none';
        renderCalendar(currentDate);
    });
    document.getElementById('cancelBtn').addEventListener('click', () => modal.style.display = 'none');

    // スワイプで月の移動
    let startX = 0;
    document.getElementById('swipeArea').addEventListener('touchstart', (e) => startX = e.touches[0].clientX, {passive:true});
    document.getElementById('swipeArea').addEventListener('touchend', (e) => {
        const diffX = e.changedTouches[0].clientX - startX;
        if (diffX > 60) { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(currentDate); }
        if (diffX < -60) { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(currentDate); }
    }, {passive:true});

    // 各ボタンの動作
    prevBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(currentDate); });
    nextBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(currentDate); });
    
    todayBtn.addEventListener('click', () => {
        currentDate = new Date();
        selectedDateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(currentDate.getDate()).padStart(2, '0')}`;
        renderCalendar(currentDate);
    });

    // 初期起動
    renderCalendar(currentDate);
</script>
</body>
</html>
